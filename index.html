<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Anaya Infotech – Best IT Training Institute</title>

  <!-- Google Fonts: Syne (headings) + DM Sans (body) -->
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet"/>

  <style>
    /* ── CSS Variables (colors, radius) ── */
    :root {
      --blue: #1a3fcc;  --cyan: #00d4ff;  --orange: #ff6b00;
      --bg: #04091a;    --bg2: #080f25;   --bg3: #0d1835;
      --text: #e8eeff;  --muted: #7a8db3;
      --card-bg: rgba(255,255,255,0.04);
      --card-border: rgba(100,130,255,0.15);
      --radius: 16px;
    }

    /* ── Sections: Navbar, Hero, Courses, Why, Certs,
           Testimonials, Placement, Contact, Footer ── */
    /* ── Animations: fadeUp, floatOrb, pulse, spinSlow ── */
    /* ── Responsive breakpoints: 900px, 600px ── */
    /* ── Scroll reveal: .reveal → .visible ── */

    body{
      margin:0;
      font-family:"DM Sans",system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background: radial-gradient(1200px 800px at 20% -10%, rgba(0,212,255,0.14), transparent 60%),
                  radial-gradient(900px 650px at 90% 0%, rgba(26,63,204,0.20), transparent 55%),
                  linear-gradient(180deg, var(--bg), var(--bg2));
      color:var(--text);
    }

    #contact{
      padding: 56px 18px;
      display: grid;
      place-items: center;
    }
    #training{
      padding: 56px 18px 10px;
      display: grid;
      place-items: center;
    }
    #training > *{
      max-width: 980px;
      width: 100%;
    }
    #training h2{
      margin: 0 0 14px;
      font-family:"Syne",system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      font-size: clamp(26px, 4vw, 40px);
      letter-spacing: 0.2px;
    }
    #training .training-card{
      margin-top: 10px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      padding: 22px 18px;
      box-shadow: 0 16px 50px rgba(0,0,0,0.35);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    #training .training-grid{
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }
    #training .training-item{
      border-radius: calc(var(--radius) - 6px);
      border: 1px solid rgba(255,255,255,0.06);
      background: rgba(8,15,37,0.55);
      padding: 14px 14px;
      font-weight: 600;
      color: var(--text);
    }
    #contact > *{
      max-width: 980px;
      width: 100%;
    }
    #contact h2{
      margin: 0 0 14px;
      font-family:"Syne",system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      font-size: clamp(26px, 4vw, 40px);
      letter-spacing: 0.2px;
    }
    #contact .contact-card{
      margin-top: 10px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      padding: 22px 18px;
      box-shadow: 0 16px 50px rgba(0,0,0,0.35);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    #contact .contact-grid{
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }
    #contact .contact-item{
      border-radius: calc(var(--radius) - 6px);
      border: 1px solid rgba(255,255,255,0.06);
      background: rgba(8,15,37,0.55);
      padding: 14px 14px;
    }
    #contact .contact-item .label{
      display: block;
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.25px;
      margin-bottom: 6px;
      text-transform: uppercase;
    }
    #contact .contact-item .value{
      font-weight: 600;
      color: var(--text);
      word-break: break-word;
    }
    #contact a{
      color: inherit;
      text-decoration: none;
      border-bottom: 1px dashed rgba(0,212,255,0.55);
    }
    #contact a:hover{
      border-bottom-color: rgba(255,107,0,0.65);
    }
    @media (max-width: 900px){
      #training .training-grid{ grid-template-columns: 1fr; }
      #contact .contact-grid{ grid-template-columns: 1fr; }
    }
  </style>
</head>

<body>
  <!-- NAVBAR (fixed, blur backdrop, mobile hamburger) -->
  <!-- MOBILE NAV DROPDOWN -->
  <!-- HERO (orbs, grid bg, stats bar) -->
  <!-- COURSES GRID (9 course cards) -->
  <!-- WHY Anaya Infotech (rotating circle + feature list) -->
  <!-- CERTIFICATIONS (10 cert cards) -->
  <!-- TESTIMONIALS (6 student reviews) -->
  <!-- PLACEMENT (companies row) -->
  <!-- CONTACT (info + form) -->
  <!-- FOOTER (4-column grid) -->

  <section id="training">
    <h2>Training Content</h2>
    <div class="training-card">
      <div class="training-grid">
        <div class="training-item">RHCSA</div>
        <div class="training-item">RHCE</div>
        <div class="training-item">AWS CLOUD</div>
        <div class="training-item">AZURE CLOUD</div>
        <div class="training-item">GOOGLE CLOUD</div>
        <div class="training-item">Kubernetes/Docker</div>
        <div class="training-item">DEVOPS</div>
      </div>
    </div>
  </section>

  <section id="contact">
    <h2>Contact</h2>

    <div class="contact-card">
      <div class="contact-grid">
        <div class="contact-item">
          <span class="label">Phone</span>
          <span class="value"><a href="tel:8871004497">8871004497</a></span>
        </div>
        <div class="contact-item">
          <span class="label">Email</span>
          <span class="value"><a href="mailto:devopsavinashpandey@gmail.com">devopsavinashpandey@gmail.com</a></span>
        </div>
        <div class="contact-item">
          <span class="label">Address</span>
          <span class="value">Nehru Nagar, Bhopal 462003</span>
        </div>
      </div>
    </div>
  </section>

  <script>

  </script>
</body>
</html>
